# nginx.conf
server {
  # Listen on port 8080, which is the standard for Cloud Run containers.
  listen 8080;
  server_name localhost;

  # Root directory for the static files.
  location / {
    root   /usr/share/nginx/html;
    index  index.html;
    
    # This is the most critical part for a Single Page Application (SPA).
    # If a file or directory is not found, it falls back to serving /index.html.
    # This allows React Router to handle the URL routing on the client side.
    try_files $uri $uri/ /index.html;
  }

  # Optional: Define a custom error page for server errors.
  error_page   500 502 503 504  /50x.html;
  location = /50x.html {
    root   /usr/share/nginx/html;
  }
}
